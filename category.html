<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Shop — ÓRBITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="wrap">
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>

  <div class="wrap" id="category-hero-slot"></div>

  <div class="wrap" id="trust-row-slot"></div>

  <section class="wrap" style="padding-top:0;">
    <div class="toolbar">
      <div class="toolbar-filters">
        <button class="filter-toggle-btn" id="filter-toggle" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
          Filter
        </button>
        <div class="chip-group" id="filter-chips"></div>
      </div>
      <div class="toolbar-right">
        <span class="result-count" id="result-count"></span>
        <select class="sort-select" id="sort-select">
          <option value="featured">Sort: Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
        </select>
      </div>
    </div>

    <div class="products-grid" id="products-grid"></div>

    <div class="load-more-wrap" id="load-more-wrap">
      <button class="btn-primary" id="load-more-btn">Load more products
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5H13M13 5L9 1M13 5L9 9" stroke="currentColor" stroke-width="1.6"/></svg>
      </button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const catId = params.get('cat');
const searchQuery = params.get('search');
const category = catId ? getCategory(catId) : null;

let baseList;
let heroTitle, heroDesc, heroBanner, heroAccent;

if(searchQuery){
  baseList = searchProducts(searchQuery);
  heroTitle = `Search results for "${searchQuery}"`;
  heroDesc = `${baseList.length} product${baseList.length === 1 ? '' : 's'} matching your search.`;
  heroBanner = null;
} else if(category){
  baseList = getProductsByCategory(category.id);
  heroTitle = category.name;
  heroDesc = category.description;
  heroBanner = category.banner;
  heroAccent = category.accent;
} else {
  baseList = PRODUCTS.slice();
  heroTitle = 'All Products';
  heroDesc = 'Every product across the five worlds of ÓRBITA, in one place.';
  heroBanner = null;
}

document.getElementById('page-title').textContent = `${heroTitle} — ÓRBITA`;

/* ---------------- BREADCRUMB ---------------- */
const crumbs = [`<a href="orbita.html">Home</a>`, `<span class="sep">/</span>`];
if(category){
  crumbs.push(`<span class="current">${category.name}</span>`);
} else if(searchQuery){
  crumbs.push(`<span class="current">Search</span>`);
} else {
  crumbs.push(`<span class="current">All Products</span>`);
}
document.getElementById('breadcrumb').innerHTML = crumbs.join(' ');

/* ---------------- HERO BANNER ---------------- */
const heroSlot = document.getElementById('category-hero-slot');
if(heroBanner){
  heroSlot.innerHTML = `
    <div class="category-hero reveal" style="--accent:${heroAccent}">
      <img src="${heroBanner}" alt="${heroTitle}">
      <div class="category-hero-inner">
        <h1>${heroTitle}</h1>
        <p>${heroDesc}</p>
      </div>
    </div>`;
} else {
  heroSlot.innerHTML = `
    <div class="category-hero reveal" style="--accent:var(--blue);background:var(--hero-dark);">
      <div class="category-hero-inner">
        <h1>${heroTitle}</h1>
        <p>${heroDesc}</p>
      </div>
    </div>`;
}

/* ---------------- TRUST ROW ---------------- */
const trustSlot = document.getElementById('trust-row-slot');
if(category){
  trustSlot.innerHTML = `
    <div class="trust-row reveal">
      <div class="tr-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 11 4.6-2.4 8-6 8-11V5l-8-3Z"/></svg>
        <div><strong>Quality tested</strong><span>Only reliable products</span></div>
      </div>
      <div class="tr-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/></svg>
        <div><strong>Handpicked</strong><span>${category.curatedFor}</span></div>
      </div>
      <div class="tr-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v5h5"/></svg>
        <div><strong>30-day returns</strong><span>Hassle-free returns</span></div>
      </div>
      <div class="tr-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        <div><strong>Secure checkout</strong><span>Your data is protected</span></div>
      </div>
    </div>`;
}

/* ---------------- FILTER CHIPS (subcategories) ---------------- */
const toolbarFilters = document.querySelector('.toolbar-filters');
if(category){
  toolbarFilters.style.setProperty('--accent', category.accent);
}
const subcatOptions = category ? ['All', ...category.subcategories] : ['All'];
document.getElementById('filter-chips').innerHTML = subcatOptions.map((s,i)=>
  `<button class="filter-chip ${i===0 ? 'active' : ''}" data-subcat="${s}">${s}</button>`
).join('');

document.getElementById('filter-toggle').addEventListener('click', ()=>{
  toolbarFilters.classList.toggle('filters-open');
});

/* ---------------- FILTER + SORT + PAGINATE ---------------- */
const PAGE_SIZE = 8;
let subcatFilter = 'All';
let sortMode = 'featured';
let visibleCount = PAGE_SIZE;

function getFilteredSorted(){
  let list = subcatFilter === 'All' ? baseList : baseList.filter(p => p.subcategory === subcatFilter);
  if(sortMode === 'price-asc') list = list.slice().sort((a,b)=> a.price - b.price);
  else if(sortMode === 'price-desc') list = list.slice().sort((a,b)=> b.price - a.price);
  else if(sortMode === 'name-asc') list = list.slice().sort((a,b)=> a.name.localeCompare(b.name));
  return list;
}

function render(){
  const filtered = getFilteredSorted();
  const shown = filtered.slice(0, visibleCount);
  renderProductGrid(document.getElementById('products-grid'), shown);

  document.getElementById('result-count').textContent =
    `${filtered.length} product${filtered.length === 1 ? '' : 's'}`;

  const loadMoreWrap = document.getElementById('load-more-wrap');
  loadMoreWrap.style.display = visibleCount < filtered.length ? 'block' : 'none';

  initRevealObserver();
}

document.getElementById('filter-chips').addEventListener('click', (e)=>{
  const chip = e.target.closest('.filter-chip');
  if(!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=> c.classList.remove('active'));
  chip.classList.add('active');
  subcatFilter = chip.dataset.subcat;
  visibleCount = PAGE_SIZE;
  render();
});

document.getElementById('sort-select').addEventListener('change', (e)=>{
  sortMode = e.target.value;
  render();
});

document.getElementById('load-more-btn').addEventListener('click', ()=>{
  visibleCount += PAGE_SIZE;
  render();
});

if(category){
  document.getElementById('load-more-btn').style.background = category.accent;
}

render();
</script>
</body>
</html>
