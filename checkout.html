<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — ÓRBITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="wrap">
    <div class="breadcrumb">
      <a href="orbita.html">Home</a> <span class="sep">/</span>
      <a href="cart.html">Cart</a> <span class="sep">/</span>
      <span class="current">Checkout</span>
    </div>
  </div>

  <section class="wrap" style="padding-top:10px;" id="checkout-section"></section>
</main>

<div id="site-footer"></div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script>
const section = document.getElementById('checkout-section');

function renderCheckoutForm(){
  const lines = getCartLines();
  if(lines.length === 0){
    section.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <h3>Nothing to check out yet</h3>
        <p>Your cart is empty — add a few products before heading to checkout.</p>
        <a href="category.html" class="btn-primary" style="justify-content:center;">Browse Products</a>
      </div>`;
    return;
  }

  const subtotal = getCartSubtotal();
  const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FLAT;
  const total = subtotal + shipping;

  section.innerHTML = `
    <div class="checkout-steps">
      <div class="checkout-step active"><span class="num">1</span> Information</div>
      <div class="checkout-step active"><span class="num">2</span> Payment</div>
      <div class="checkout-step"><span class="num">3</span> Confirmation</div>
    </div>
    <div class="checkout-page">
      <form id="checkout-form">
        <div class="form-section">
          <h3>Contact information</h3>
          <div class="form-grid">
            <div class="form-field span-2">
              <label for="email">Email</label>
              <input type="email" id="email" required placeholder="you@example.com">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3>Shipping address</h3>
          <div class="form-grid">
            <div class="form-field">
              <label for="first-name">First name</label>
              <input type="text" id="first-name" required>
            </div>
            <div class="form-field">
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" required>
            </div>
            <div class="form-field span-2">
              <label for="address">Address</label>
              <input type="text" id="address" required placeholder="Street and number">
            </div>
            <div class="form-field">
              <label for="city">City</label>
              <input type="text" id="city" required>
            </div>
            <div class="form-field">
              <label for="postcode">Postcode</label>
              <input type="text" id="postcode" required>
            </div>
            <div class="form-field span-2">
              <label for="country">Country</label>
              <select id="country">
                <option>United Kingdom</option>
                <option>Ireland</option>
                <option>Portugal</option>
                <option>Brazil</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3>Payment</h3>
          <div class="payment-methods">
            <button type="button" class="payment-method active" data-method="card">💳 Card</button>
            <button type="button" class="payment-method" data-method="paypal">🅿️ PayPal</button>
          </div>
          <div class="form-grid" id="card-fields">
            <div class="form-field span-2">
              <label for="card-number">Card number</label>
              <input type="text" id="card-number" inputmode="numeric" maxlength="19" placeholder="1234 1234 1234 1234" required>
            </div>
            <div class="form-field">
              <label for="card-expiry">Expiry (MM/YY)</label>
              <input type="text" id="card-expiry" maxlength="5" placeholder="MM/YY" required>
            </div>
            <div class="form-field">
              <label for="card-cvc">CVC</label>
              <input type="text" id="card-cvc" inputmode="numeric" maxlength="4" placeholder="123" required>
            </div>
          </div>
          <p style="font-size:12px;color:var(--text-secondary);margin-top:14px;">🔒 This is a demo checkout — no real payment is processed, and no card details are stored or transmitted.</p>
        </div>

        <button class="btn-primary" type="submit" style="width:100%;justify-content:center;">
          Place Order — ${formatGBP(total)}
        </button>
      </form>

      <div class="checkout-summary">
        <h3>Order Summary</h3>
        ${lines.map(l => `
          <div class="checkout-item">
            <div class="checkout-item-media">
              <img src="${l.product.img}" alt="${l.product.name}">
              <span class="qty-badge">${l.qty}</span>
            </div>
            <div class="checkout-item-info">${l.product.name}</div>
            <div class="checkout-item-price">${formatGBP(l.product.price * l.qty)}</div>
          </div>`).join('')}
        <div class="summary-row" style="margin-top:16px;"><span>Subtotal</span><span>${formatGBP(subtotal)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : formatGBP(shipping)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${formatGBP(total)}</span></div>
      </div>
    </div>`;

  document.querySelectorAll('.payment-method').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.payment-method').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('card-fields').style.display = btn.dataset.method === 'card' ? 'grid' : 'none';
    });
  });

  document.getElementById('card-number').addEventListener('input', function(){
    this.value = this.value.replace(/[^\d]/g,'').replace(/(.{4})/g,'$1 ').trim().slice(0,19);
  });
  document.getElementById('card-expiry').addEventListener('input', function(){
    let v = this.value.replace(/[^\d]/g,'').slice(0,4);
    if(v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    this.value = v;
  });

  document.getElementById('checkout-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    placeOrder(lines, total);
  });
}

function placeOrder(lines, total){
  const orderNumber = 'ORB-' + Math.floor(100000 + Math.random()*900000);
  const email = document.getElementById('email').value;
  clearCart();

  section.innerHTML = `
    <div class="checkout-steps">
      <div class="checkout-step active"><span class="num">1</span> Information</div>
      <div class="checkout-step active"><span class="num">2</span> Payment</div>
      <div class="checkout-step active"><span class="num">3</span> Confirmation</div>
    </div>
    <div class="order-confirmation">
      <div class="check-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h1>Order confirmed</h1>
      <p>Thanks! A confirmation has been "sent" to ${email || 'your email'}.</p>
      <div class="order-number">${orderNumber}</div>
      <p>${lines.length} item${lines.length === 1 ? '' : 's'} · Total ${formatGBP(total)}</p>
      <div class="hero-actions" style="justify-content:center;margin-top:26px;">
        <a href="category.html" class="btn-primary" style="justify-content:center;">Continue Shopping</a>
      </div>
      <div class="demo-note">
        <strong>For the site owner:</strong> this confirmation is generated entirely in the browser — no order was actually charged or stored. To take real orders, connect this checkout form to a payment gateway (Stripe, PayPal) and a backend or platform (Shopify, WooCommerce) that can process payment and persist orders.
      </div>
    </div>`;
}

renderCheckoutForm();
</script>
</body>
</html>
